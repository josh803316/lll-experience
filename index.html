<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LLL Draft Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="tokens.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #2a251a;
        color: #f3ede0;
        font-family: 'Inter Tight', system-ui, sans-serif;
        min-height: 100vh;
      }
      /* Canvas host fills viewport */
      #canvas-root {
        min-height: 100vh;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="canvas-root"></div>

    <template id="__bundler_thumbnail" data-bg-color="#f3ede0">
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <rect width="1200" height="800" fill="#f3ede0" />
        <text
          x="600"
          y="380"
          font-family="Source Serif 4, Georgia, serif"
          font-size="220"
          font-weight="600"
          fill="#14110b"
          text-anchor="middle"
          letter-spacing="-8"
        >
          L·L·L
        </text>
        <text
          x="600"
          y="470"
          font-family="JetBrains Mono, monospace"
          font-size="32"
          letter-spacing="8"
          fill="#c9341d"
          text-anchor="middle"
        >
          DRAFT ANALYZER
        </text>
        <line x1="400" y1="520" x2="800" y2="520" stroke="#14110b" stroke-width="2" />
        <text
          x="600"
          y="560"
          font-family="JetBrains Mono, monospace"
          font-size="18"
          letter-spacing="3"
          fill="#6b5e44"
          text-anchor="middle"
        >
          YEAR-ROUND DRAFT INTELLIGENCE
        </text>
      </svg>
    </template>

    <script type="text/babel" src="data.jsx"></script>
    <script type="text/babel" src="primitives.jsx"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="ios-frame.jsx"></script>
    <script type="text/babel" src="browser-window.jsx"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="mobile-screens.jsx"></script>
    <script type="text/babel" src="desktop-screens.jsx"></script>

    <script type="text/babel" data-presets="env,react">
      const {useState, useEffect} = React;

      const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/ {
        theme: 'paper',
        featuredTeam: 'DET',
        density: 'standard',
        highlightExpert: 'db',
      }; /*EDITMODE-END*/

      function MobilePrototype({teamId}) {
        const [tab, setTab] = useState('team');
        const [playerId, setPlayerId] = useState(null);

        let body;
        if (tab === 'team') {
          body = playerId ? (
            <MobilePlayerProfile playerId={playerId} onBack={() => setPlayerId(null)} />
          ) : (
            <MobileTeamScorecard teamId={teamId} onPlayer={(id) => setPlayerId(id)} />
          );
        } else if (tab === 'player') {
          body = <MobilePlayerProfile playerId={playerId || 'p10'} onBack={() => setTab('team')} />;
        } else if (tab === 'expert') {
          body = <MobileExpertBoard />;
        } else if (tab === 'recap') {
          body = <MobileRecap />;
        } else if (tab === 'feed') {
          body = <MobileLiveFeed />;
        }

        return (
          <div
            className='lll'
            style={{display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)'}}
          >
            <div style={{flex: 1, overflowY: 'auto', overflowX: 'hidden'}}>{body}</div>
            <MobileTabBar
              active={tab === 'player' ? 'team' : tab}
              onChange={(t) => {
                setTab(t);
                setPlayerId(null);
              }}
            />
          </div>
        );
      }

      function DesktopPrototype({teamId}) {
        const [view, setView] = useState('dashboard');
        const [activeTeam, setActiveTeam] = useState(teamId);
        const [activePlayer, setActivePlayer] = useState(null);

        let body, crumbs;
        if (view === 'teams') {
          crumbs = `Teams / ${activeTeam}`;
          body = (
            <DesktopTeam
              teamId={activeTeam}
              onPlayer={(id) => {
                setActivePlayer(id);
              }}
            />
          );
        } else if (view === 'experts') {
          crumbs = 'Experts / Leaderboard';
          body = <DesktopExperts />;
        } else {
          crumbs = 'Dashboard / League overview';
          body = (
            <DesktopDashboard
              onTeam={(t) => {
                setActiveTeam(t);
                setView('teams');
              }}
            />
          );
        }

        return (
          <div className='lll' style={{height: '100%', overflow: 'auto'}}>
            <DesktopShell active={view} onNav={setView} breadcrumbs={crumbs}>
              {body}
            </DesktopShell>
          </div>
        );
      }

      function App() {
        const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
        const themeClass = tweaks.theme === 'terminal' ? 'theme-terminal' : '';

        return (
          <div className={themeClass} style={{minHeight: '100vh'}}>
            <DesignCanvas
              title='LLL Draft Analyzer'
              subtitle='Mobile + desktop, side-by-side. Year-round draft intelligence.'
            >
              {/* Mobile prototype */}
              <DCSection id='mobile' title='Mobile · iOS prototype'>
                <DCArtboard id='mobile-prototype' label='Full prototype · 5 tabs' width={420} height={900}>
                  <IOSDevice width={402} height={874}>
                    <MobilePrototype teamId={tweaks.featuredTeam} />
                  </IOSDevice>
                </DCArtboard>

                <DCArtboard id='mobile-feed-static' label='Live feed (combine → camp)' width={420} height={900}>
                  <IOSDevice width={402} height={874}>
                    <div
                      className='lll'
                      style={{display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)'}}
                    >
                      <div style={{flex: 1, overflowY: 'auto'}}>
                        <MobileLiveFeed />
                      </div>
                      <MobileTabBar active='feed' onChange={() => {}} />
                    </div>
                  </IOSDevice>
                </DCArtboard>

                <DCArtboard id='mobile-experts' label='Expert leaderboard' width={420} height={900}>
                  <IOSDevice width={402} height={874}>
                    <div
                      className='lll'
                      style={{display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)'}}
                    >
                      <div style={{flex: 1, overflowY: 'auto'}}>
                        <MobileExpertBoard />
                      </div>
                      <MobileTabBar active='expert' onChange={() => {}} />
                    </div>
                  </IOSDevice>
                </DCArtboard>

                <DCArtboard id='mobile-recap' label='Year-by-year recap' width={420} height={900}>
                  <IOSDevice width={402} height={874}>
                    <div
                      className='lll'
                      style={{display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)'}}
                    >
                      <div style={{flex: 1, overflowY: 'auto'}}>
                        <MobileRecap />
                      </div>
                      <MobileTabBar active='recap' onChange={() => {}} />
                    </div>
                  </IOSDevice>
                </DCArtboard>

                <DCArtboard id='mobile-player' label='Player profile' width={420} height={900}>
                  <IOSDevice width={402} height={874}>
                    <div
                      className='lll'
                      style={{display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)'}}
                    >
                      <div style={{flex: 1, overflowY: 'auto'}}>
                        <MobilePlayerProfile playerId='p10' />
                      </div>
                      <MobileTabBar active='team' onChange={() => {}} />
                    </div>
                  </IOSDevice>
                </DCArtboard>
              </DCSection>

              {/* Desktop prototype */}
              <DCSection id='desktop' title='Desktop · Web prototype'>
                <DCArtboard id='desktop-dashboard' label='Dashboard · league state' width={1280} height={900}>
                  <ChromeWindow
                    url='lll.football/dashboard'
                    tabs={[{title: 'LLL · Dashboard'}]}
                    width={1280}
                    height={900}
                  >
                    <DesktopPrototype teamId={tweaks.featuredTeam} />
                  </ChromeWindow>
                </DCArtboard>

                <DCArtboard id='desktop-team' label='Team scorecard · Lions' width={1280} height={900}>
                  <ChromeWindow
                    url='lll.football/teams/det'
                    tabs={[{title: 'LLL · Detroit Lions'}]}
                    width={1280}
                    height={900}
                  >
                    <div className='lll' style={{height: '100%', overflow: 'auto'}}>
                      <DesktopShell active='teams' onNav={() => {}} breadcrumbs='Teams / Detroit Lions'>
                        <DesktopTeam teamId={tweaks.featuredTeam} />
                      </DesktopShell>
                    </div>
                  </ChromeWindow>
                </DCArtboard>

                <DCArtboard id='desktop-experts' label='Expert ledger · 18 cycles' width={1280} height={900}>
                  <ChromeWindow url='lll.football/experts' tabs={[{title: 'LLL · Experts'}]} width={1280} height={900}>
                    <div className='lll' style={{height: '100%', overflow: 'auto'}}>
                      <DesktopShell active='experts' onNav={() => {}} breadcrumbs='Experts / Leaderboard'>
                        <DesktopExperts />
                      </DesktopShell>
                    </div>
                  </ChromeWindow>
                </DCArtboard>
              </DCSection>
            </DesignCanvas>

            <TweaksPanel title='Tweaks'>
              <TweakSection label='Theme'>
                <TweakRadio
                  value={tweaks.theme}
                  onChange={(v) => setTweak('theme', v)}
                  options={[
                    {value: 'paper', label: 'Editorial'},
                    {value: 'terminal', label: 'Terminal'},
                  ]}
                />
              </TweakSection>
              <TweakSection label='Featured team'>
                <TweakSelect
                  value={tweaks.featuredTeam}
                  onChange={(v) => setTweak('featuredTeam', v)}
                  options={window.LLL_DATA.TEAMS.map((t) => ({value: t.id, label: `${t.city} ${t.name}`}))}
                />
              </TweakSection>
              <TweakSection label='Highlight expert'>
                <TweakSelect
                  value={tweaks.highlightExpert}
                  onChange={(v) => setTweak('highlightExpert', v)}
                  options={window.LLL_DATA.EXPERTS.map((e) => ({value: e.id, label: e.name}))}
                />
              </TweakSection>
            </TweaksPanel>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('canvas-root')).render(<App />);
    </script>
  </body>
</html>
