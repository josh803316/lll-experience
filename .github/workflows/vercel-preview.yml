name: Vercel Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    uses: josh803316/shared-ci-workflows/.github/workflows/vercel-preview.yml@main
    with:
      app-name: lll-experience
      vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
      vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
      build-command: 'bun run build'
    secrets: inherit
