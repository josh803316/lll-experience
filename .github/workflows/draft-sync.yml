name: Keep Alive

on:
  # Twice weekly (Sun + Wed at noon UTC / 8 AM ET) — keeps Supabase DB from
  # pausing. Supabase pauses free projects after 7 days of inactivity, and
  # GitHub Actions cron is best-effort, so two runs/week gives headroom if
  # one is skipped.
  schedule:
    - cron: '0 12 * * 0,3'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "=== Keep-alive ping at $(date -u) ==="
          # Hit health check (wakes up the serverless function + DB connection)
          curl -sf "$SITE_URL/health" || true
          # Hit the cron endpoint to trigger a DB query
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/sync-draft-picks")
          echo "HTTP $STATUS"
          cat /tmp/response.json
