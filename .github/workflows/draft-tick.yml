name: Draft Tick

# Sync picks + generate writeups during the draft. GitHub Actions cron is
# best-effort (5-min minimum + frequent queue skips), so each invocation
# loops internally for ~4 minutes hitting the cron every 30s. That way a
# single scheduled run covers a full 5-minute window even if subsequent
# scheduled runs are delayed or skipped.
#
# Triggers: every 5 minutes (best-effort), on every push (immediate after
# deploy), and on-demand via workflow_dispatch.

on:
  # Schedule + push triggers disabled post-draft. Run manually via
  # workflow_dispatch if you need to backfill writeups.
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-regenerate writeups (1 = regenerate oldest/unmigrated picks)'
        required: false
        default: '0'

concurrency:
  group: draft-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Sync picks + generate writeups
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event.inputs.force || '0' }}
        run: |
          set -e
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SITE_URL or CRON_SECRET secret is not set"
            exit 1
          fi
          # In force mode, skip sync (the backfill only cares about writeups)
          # and pass force=1 + a longer timeout because each pick is ~30s.
          if [ "$FORCE" = "1" ] || [ "$FORCE" = "true" ]; then
            FORCE_QS="&force=1"
            ENDPOINTS="generate-writeups"
            CURL_TIMEOUT=180
          else
            FORCE_QS=""
            ENDPOINTS="sync-draft-picks generate-writeups"
            CURL_TIMEOUT=25
          fi
          echo "=== Draft tick window starting at $(date -u) (force=$FORCE) ==="
          # Loop for up to ~4 minutes (8 ticks * 30s). Even if scheduled runs
          # are delayed/skipped, this guarantees frequent updates while one
          # run is alive.
          for tick in 1 2 3 4 5 6 7 8; do
            echo
            echo "--- tick $tick / 8 at $(date -u +%H:%M:%S) ---"
            for endpoint in $ENDPOINTS; do
              STATUS=$(curl -sS -o /tmp/resp.json -w "%{http_code}" --max-time $CURL_TIMEOUT \
                -H "Authorization: Bearer $CRON_SECRET" \
                "$SITE_URL/api/cron/$endpoint?batch=5$FORCE_QS" || echo "000")
              BODY=$(cat /tmp/resp.json 2>/dev/null | head -c 250 || true)
              echo "$endpoint: HTTP $STATUS — $BODY"
              if [ "$STATUS" != "200" ]; then
                echo "::warning::$endpoint returned $STATUS"
              fi
            done
            # Sleep between ticks unless this was the last one
            if [ "$tick" != "8" ]; then
              sleep 30
            fi
          done
          echo
          echo "=== Tick window done at $(date -u) ==="
